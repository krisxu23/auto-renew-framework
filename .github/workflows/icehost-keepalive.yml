name: IceHost Hourly KeepAlive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cloudflare_cron_trigger]
  # schedule:
  #   - cron: '0 * * * *'   # 每小时整点触发

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.1

      - name: Run IceHost check script
        env:
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          ICEHOST_COOKIES: ${{ secrets.ICEHOST_COOKIES }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python icehost_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icehost-debug-screenshot
          path: icehost_debug_screenshot.png
          if-no-files-found: ignore

      # ========== 新增：自动更新 Cookie Secret ==========
      - name: Update ICEHOST_COOKIES secret
        if: always()   # 无论续期成功还是失败，都尝试更新（Cookie可能已变化）
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}   # 需要具有 repo 写入权限的 PAT
        run: |
          # 检查导出的 Cookie 文件是否存在
          if [ -f icehost_exported_cookies.json ]; then
            echo "正在更新 ICEHOST_COOKIES Secret..."
            # 将 JSON 文件内容作为新值设置到 Secret
            gh secret set ICEHOST_COOKIES < icehost_exported_cookies.json
            echo "Secret 更新成功！"
          else
            echo "未找到 icehost_exported_cookies.json，跳过更新。"
          fi
